<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movi Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    movi-player { width: 100%; height: 100%; display: block; }

    .file-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }

    .file-overlay.hidden { display: none; }

    .promo-links {
      position: absolute;
      bottom: 24px;
      display: flex;
      gap: 20px;
    }

    .promo-links a {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 12px;
      font-weight: 500;
      color: #444;
      text-decoration: none;
      transition: color 0.15s;
      font-family: -apple-system, sans-serif;
    }

    .promo-links a:hover { color: #8B5CF6; }
    .promo-links a svg { flex-shrink: 0; }

    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 20px;
      border: 2px dashed #2a2a35;
      border-radius: 20px;
      padding: 60px 80px;
      text-align: center;
      transition: all 0.3s;
    }

    .drop-zone.dragover {
      border-color: #8B5CF6;
      background: rgba(139, 92, 246, 0.08);
    }

    .drop-icon {
      width: 56px;
      height: 56px;
      border-radius: 16px;
      background: rgba(139, 92, 246, 0.1);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .drop-icon svg {
      width: 28px;
      height: 28px;
      color: #8B5CF6;
    }

    .drop-zone h2 {
      font-size: 18px;
      font-weight: 600;
      color: #fff;
    }

    .drop-zone p {
      font-size: 13px;
      color: #555;
      margin-top: -12px;
    }

    .file-btn {
      background: #8B5CF6;
      color: #fff;
      border: none;
      padding: 12px 36px;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.2s;
    }

    .file-btn:hover { background: #7C3AED; transform: translateY(-1px); }

    .file-formats {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      justify-content: center;
    }

    .file-formats span {
      font-size: 10px;
      font-weight: 600;
      color: #444;
      background: #151520;
      padding: 3px 8px;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <movi-player
    id="player"
    controls
    autoplay
    thumb
    fastseek
    showtitle
    resume
    gesturefs
  ></movi-player>

  <div class="file-overlay hidden" id="fileOverlay">
    <div class="promo-links">
      <a href="https://github.com/MrUjjwalG/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.8.2 3.2.7.8 1.2 1.9 1.2 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
        GitHub
      </a>
      <a href="https://www.npmjs.com/package/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.331h-2.669zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"/></svg>
        npm
      </a>
      <a href="https://mrujjwalg.github.io/movi-player/" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Docs
      </a>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
          <polyline points="17 8 12 3 7 8"></polyline>
          <line x1="12" y1="3" x2="12" y2="15"></line>
        </svg>
      </div>
      <h2>Drop video file here</h2>
      <p>or</p>
      <label class="file-btn">
        Browse Files
        <input type="file" id="filePicker" accept="video/*,.mkv,.ts,.avi,.flv,.wmv" style="display:none">
      </label>
      <div class="file-formats">
        <span>MP4</span><span>MKV</span><span>WebM</span><span>MOV</span>
        <span>TS</span><span>AVI</span><span>HEVC</span><span>AV1</span><span>HDR</span>
      </div>
    </div>
  </div>

  <script src="dist/element.js" type="module"></script>
  <script src="player.js"></script>
</body>
</html>
