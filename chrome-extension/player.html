<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movi Player</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    movi-player { width: 100%; height: 100%; display: block; }

    .file-overlay {
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      z-index: 9999;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }

    .file-overlay.hidden { display: none; }

    .drop-zone {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 24px;
      width: 100%;
      height: 100%;
      cursor: pointer;
      transition: all 0.3s;
    }

    .drop-zone.dragover .drop-visual svg {
      color: #8B5CF6;
      opacity: 1;
      transform: translateY(-4px);
    }

    .drop-visual {
      color: #555;
      transition: all 0.3s;
    }

    .drop-visual svg {
      transition: all 0.3s;
    }

    .drop-text {
      text-align: center;
    }

    .drop-text h2 {
      font-size: 20px;
      font-weight: 600;
      color: #eee;
      font-family: -apple-system, sans-serif;
      margin-bottom: 6px;
    }

    .drop-text p {
      font-size: 13px;
      color: #444;
      font-family: -apple-system, sans-serif;
    }

    .browse-btn {
      background: #8B5CF6;
      color: #fff;
      border: none;
      padding: 12px 40px;
      border-radius: 12px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      font-family: -apple-system, sans-serif;
      transition: all 0.2s;
    }

    .browse-btn:hover { background: #7C3AED; transform: translateY(-2px); box-shadow: 0 8px 24px rgba(139,92,246,0.3); }

    .drop-formats {
      font-size: 11px;
      color: #333;
      font-family: -apple-system, sans-serif;
      letter-spacing: 0.5px;
    }

    .promo-links {
      position: absolute;
      bottom: 20px;
      display: flex;
      gap: 16px;
    }
    .promo-links a {
      color: #2a2a35;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-family: -apple-system, sans-serif;
      transition: color 0.15s;
    }
    .promo-links a:hover { color: #8B5CF6; }
    .promo-links a svg { width: 14px; height: 14px; }

    /* ─── TMDb Info Panel ────────────── */
    .tmdb-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 9990;
      width: 36px;
      height: 36px;
      background: rgba(17, 17, 26, 0.85);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1px solid #1a1a26;
      border-radius: 10px;
      color: #888;
      cursor: pointer;
      display: none;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    .tmdb-toggle.visible { display: flex; }
    .tmdb-toggle:hover { color: #A78BFA; border-color: #8B5CF6; background: rgba(139, 92, 246, 0.1); }
    .tmdb-toggle svg { width: 18px; height: 18px; }

    .tmdb-panel {
      position: fixed;
      top: 0;
      right: -380px;
      width: 360px;
      height: 100%;
      z-index: 9991;
      background: #0a0a10;
      border-left: 1px solid #1a1a26;
      overflow-y: auto;
      transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    .tmdb-panel.open { right: 0; }
    .tmdb-panel::-webkit-scrollbar { width: 4px; }
    .tmdb-panel::-webkit-scrollbar-thumb { background: #222; border-radius: 4px; }

    .tmdb-backdrop {
      position: relative;
      width: 100%;
      height: 200px;
      overflow: hidden;
    }
    .tmdb-backdrop img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .tmdb-backdrop .gradient {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      height: 120px;
      background: linear-gradient(transparent, #0a0a10);
    }

    .tmdb-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 30px;
      height: 30px;
      background: rgba(0,0,0,0.6);
      backdrop-filter: blur(6px);
      border: none;
      border-radius: 8px;
      color: #999;
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 1;
    }
    .tmdb-close:hover { color: #fff; background: rgba(0,0,0,0.8); }

    .tmdb-body { padding: 0 20px 24px; margin-top: -40px; position: relative; }

    .tmdb-poster-row {
      display: flex;
      gap: 14px;
      margin-bottom: 14px;
    }
    .tmdb-poster-row img {
      width: 80px;
      height: 120px;
      border-radius: 10px;
      object-fit: cover;
      box-shadow: 0 8px 24px rgba(0,0,0,0.5);
      flex-shrink: 0;
    }
    .tmdb-title-block { flex: 1; min-width: 0; padding-top: 44px; }
    .tmdb-title-block h2 {
      font-size: 17px;
      font-weight: 700;
      color: #fff;
      line-height: 1.3;
      margin-bottom: 4px;
    }
    .tmdb-title-block .original-title {
      font-size: 10px;
      color: #444;
      margin-bottom: 6px;
      font-style: italic;
    }
    .tmdb-title-block .tmdb-badges {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }
    .tmdb-badge {
      font-size: 9px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 5px;
      letter-spacing: 0.3px;
    }
    .tmdb-badge.rating { background: rgba(245, 158, 11, 0.15); color: #f59e0b; }
    .tmdb-badge.year { background: rgba(255,255,255,0.06); color: #666; }
    .tmdb-badge.type-movie { background: rgba(139, 92, 246, 0.15); color: #A78BFA; }
    .tmdb-badge.type-tv { background: rgba(59, 130, 246, 0.15); color: #60A5FA; }

    .tmdb-genres {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }
    .tmdb-genres span {
      font-size: 9px;
      font-weight: 600;
      padding: 3px 9px;
      border-radius: 20px;
      background: rgba(255,255,255,0.04);
      color: #666;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .tmdb-overview {
      font-size: 12px;
      color: #888;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .tmdb-stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      margin-bottom: 18px;
    }
    .tmdb-stat {
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .tmdb-stat .label {
      font-size: 8px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 3px;
    }
    .tmdb-stat .value {
      font-size: 12px;
      font-weight: 600;
      color: #ccc;
    }

    .tmdb-section-title {
      font-size: 10px;
      font-weight: 700;
      color: #444;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      margin-bottom: 10px;
    }

    .tmdb-cast {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 6px;
      margin-bottom: 18px;
    }
    .tmdb-cast::-webkit-scrollbar { height: 3px; }
    .tmdb-cast::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }
    .tmdb-cast-item {
      flex-shrink: 0;
      text-align: center;
      width: 56px;
    }
    .tmdb-cast-item img {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      object-fit: cover;
      background: #111;
    }
    .tmdb-cast-item .no-avatar {
      width: 46px;
      height: 46px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      margin: 0 auto;
    }
    .tmdb-cast-item .name {
      font-size: 8.5px;
      color: #666;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tmdb-cast-item .role {
      font-size: 7.5px;
      color: #333;
    }

    /* ─── Music/Person cards ────────── */
    .tmdb-music-header {
      padding: 24px 20px 16px;
      text-align: center;
    }
    .tmdb-music-header .song-name {
      font-size: 16px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 4px;
    }
    .tmdb-music-header .movie-link {
      font-size: 11px;
      color: #A78BFA;
      cursor: pointer;
    }
    .tmdb-music-header .movie-link:hover { text-decoration: underline; }

    .tmdb-people-grid {
      padding: 0 16px 20px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .tmdb-person-card {
      display: flex;
      gap: 12px;
      padding: 12px;
      background: rgba(255,255,255,0.02);
      border: 1px solid rgba(255,255,255,0.04);
      border-radius: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .tmdb-person-card:hover {
      background: rgba(139, 92, 246, 0.06);
      border-color: rgba(139, 92, 246, 0.2);
    }
    .tmdb-person-card img {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      object-fit: cover;
      background: #111;
      flex-shrink: 0;
    }
    .tmdb-person-card .no-avatar {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: #111;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 18px;
      flex-shrink: 0;
    }
    .tmdb-person-card .person-info { flex: 1; min-width: 0; }
    .tmdb-person-card .person-name {
      font-size: 13px;
      font-weight: 600;
      color: #eee;
    }
    .tmdb-person-card .person-dept {
      font-size: 10px;
      color: #555;
      margin-top: 2px;
    }
    .tmdb-person-card .person-known {
      font-size: 9px;
      color: #444;
      margin-top: 4px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* Person detail view */
    .tmdb-person-detail {
      padding: 0 20px 24px;
    }
    .tmdb-person-hero {
      text-align: center;
      padding: 24px 0 16px;
    }
    .tmdb-person-hero img {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      object-fit: cover;
      margin-bottom: 12px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    .tmdb-person-hero .no-avatar {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: #111;
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333;
      font-size: 36px;
    }
    .tmdb-person-hero h2 {
      font-size: 18px;
      font-weight: 700;
      color: #fff;
    }
    .tmdb-person-hero .dept {
      font-size: 11px;
      color: #555;
      margin-top: 3px;
    }

    .tmdb-person-bio {
      font-size: 11px;
      color: #777;
      line-height: 1.7;
      margin-bottom: 16px;
      max-height: 120px;
      overflow-y: auto;
    }
    .tmdb-person-bio::-webkit-scrollbar { width: 3px; }
    .tmdb-person-bio::-webkit-scrollbar-thumb { background: #222; border-radius: 3px; }

    .tmdb-filmography {
      margin-bottom: 16px;
    }
    .tmdb-film-item {
      display: flex;
      gap: 10px;
      padding: 8px 0;
      border-bottom: 1px solid rgba(255,255,255,0.03);
      align-items: center;
    }
    .tmdb-film-item img {
      width: 34px;
      height: 50px;
      border-radius: 6px;
      object-fit: cover;
      background: #111;
      flex-shrink: 0;
    }
    .tmdb-film-item .film-info { flex: 1; min-width: 0; }
    .tmdb-film-item .film-title {
      font-size: 11px;
      font-weight: 600;
      color: #ccc;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .tmdb-film-item .film-meta {
      font-size: 9px;
      color: #444;
      margin-top: 2px;
    }
    .tmdb-film-item .film-rating {
      font-size: 10px;
      color: #f59e0b;
    }

    .tmdb-back-btn {
      background: none;
      border: none;
      color: #A78BFA;
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      padding: 4px 0;
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 8px;
      font-family: inherit;
    }
    .tmdb-back-btn:hover { color: #c4b5fd; }
    .tmdb-back-btn svg { width: 12px; height: 12px; }

    .tmdb-loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100%;
      gap: 12px;
      color: #444;
      font-size: 12px;
    }
    .tmdb-loading .spinner {
      width: 24px; height: 24px;
      border: 2px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: tmdb-spin 0.6s linear infinite;
    }
    @keyframes tmdb-spin { to { transform: rotate(360deg); } }

    .tmdb-error {
      text-align: center;
      padding: 40px 20px;
      color: #444;
      font-size: 12px;
    }

    .loading-overlay {
      position: fixed;
      inset: 0;
      z-index: 9998;
      background: #000;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-family: -apple-system, sans-serif;
      color: #fff;
    }
    .loading-overlay.hidden { display: none; }
    .loading-spinner {
      width: 44px;
      height: 44px;
      border: 3px solid rgba(139, 92, 246, 0.2);
      border-top-color: #8B5CF6;
      border-radius: 50%;
      animation: movi-spin 0.8s linear infinite;
    }
    @keyframes movi-spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 13px; color: #888; letter-spacing: 0.3px; }
    .loading-name { font-size: 12px; color: #444; max-width: 80%; text-align: center; word-break: break-all; }
  </style>
</head>
<body>
  <movi-player
    id="player"
    controls
    autoplay
    thumb
    fastseek
    showtitle
    ambientmode
    resume
  ></movi-player>

  <!-- TMDb Info Toggle Button -->
  <button class="tmdb-toggle" id="tmdbToggle" title="Movie/TV Info">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/>
    </svg>
  </button>

  <!-- TMDb Info Panel -->
  <div class="tmdb-panel" id="tmdbPanel">
    <div id="tmdbContent"></div>
  </div>

  <div class="loading-overlay hidden" id="loadingOverlay">
    <div class="loading-spinner"></div>
    <div class="loading-text">Loading video</div>
    <div class="loading-name" id="loadingName"></div>
  </div>

  <div class="file-overlay hidden" id="fileOverlay">
    <div class="promo-links">
      <a href="https://github.com/MrUjjwalG/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.8.2 3.2.7.8 1.2 1.9 1.2 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"/></svg>
        GitHub
      </a>
      <a href="https://www.npmjs.com/package/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.331h-2.669zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"/></svg>
        npm
      </a>
      <a href="https://mrujjwalg.github.io/movi-player/" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
        Docs
      </a>
    </div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-visual">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" width="48" height="48">
          <path d="M4 14.9A7 7 0 1 1 15.7 8h1.8a4.5 4.5 0 0 1 2.5 8.2" opacity="0.3"/>
          <path d="M12 12v9"/><path d="m16 16-4-4-4 4"/>
        </svg>
      </div>
      <div class="drop-text">
        <h2>Drop video here</h2>
        <p>or click to browse</p>
      </div>
      <label class="browse-btn">
        Choose Video
        <input type="file" id="filePicker" accept="video/*,.mkv,.ts,.avi,.flv,.wmv" style="display:none">
      </label>
      <div class="drop-formats">
        MP4, MKV, HEVC, AV1, WebM, HDR, MOV, TS
      </div>
    </div>
  </div>

  <script src="dist/element.js" type="module"></script>
  <script src="player.js"></script>
  <script src="tmdb.js"></script>
</body>
</html>
