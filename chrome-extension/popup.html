<!DOCTYPE html>
<html>
<head>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 360px;
      background: #0a0a0f;
      color: #fff;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    .header {
      padding: 16px 18px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .header img {
      width: 28px;
      height: 28px;
      border-radius: 6px;
    }

    .header-text h1 {
      font-size: 15px;
      font-weight: 700;
      letter-spacing: -0.3px;
    }

    .header-text span {
      font-size: 10px;
      color: #555;
      font-weight: 500;
    }

    .body {
      padding: 14px 18px 18px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: #555;
    }

    .url-group {
      display: flex;
      gap: 6px;
    }

    input[type="text"] {
      flex: 1;
      background: #151520;
      border: 1px solid #222;
      color: #fff;
      padding: 10px 12px;
      border-radius: 8px;
      font-size: 13px;
      font-family: inherit;
      transition: border-color 0.2s;
    }

    input[type="text"]:focus {
      outline: none;
      border-color: #8B5CF6;
    }

    input[type="text"]::placeholder { color: #444; }

    .btn {
      border: none;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
    }

    .btn:hover { transform: translateY(-1px); }
    .btn:active { transform: scale(0.97); }

    .btn-primary {
      background: #8B5CF6;
      color: #fff;
      padding: 10px 18px;
    }

    .btn-primary:hover { background: #7C3AED; }

    .btn-file {
      width: 100%;
      background: #151520;
      color: #aaa;
      border: 1px dashed #333;
      padding: 12px;
      cursor: pointer;
      position: relative;
      overflow: hidden;
    }

    .btn-file:hover {
      border-color: #8B5CF6;
      color: #fff;
      background: #1a1a2a;
    }

    .btn-file input {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      cursor: pointer;
    }

    .btn-file svg {
      width: 18px;
      height: 18px;
      opacity: 0.5;
    }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      color: #333;
      font-size: 10px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 1px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #222;
    }

    .footer {
      padding: 10px 18px 12px;
      border-top: 1px solid rgba(255,255,255,0.04);
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .footer-hint {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 10px;
      color: #444;
    }

    .footer-hint svg { flex-shrink: 0; color: #444; }

    .footer-links {
      display: flex;
      gap: 12px;
    }

    .footer-links a {
      display: flex;
      align-items: center;
      gap: 5px;
      font-size: 11px;
      font-weight: 500;
      color: #555;
      text-decoration: none;
      transition: color 0.15s;
    }

    .footer-links a:hover { color: #8B5CF6; }
    .footer-links a svg { flex-shrink: 0; }

    .formats {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 2px;
    }

    .format-tag {
      font-size: 9px;
      font-weight: 600;
      color: #666;
      background: #151520;
      padding: 2px 6px;
      border-radius: 3px;
    }
  </style>
</head>
<body>
  <div class="header">
    <img src="icons/icon48.png" alt="">
    <div class="header-text">
      <h1>Movi Player</h1>
      <span>Play any video format</span>
    </div>
  </div>

  <div class="body">
    <div class="section-label">Play from URL</div>
    <div class="url-group">
      <input type="text" id="url" placeholder="https://example.com/video.mkv" />
      <button class="btn btn-primary" id="play">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M8 5v14l11-7z"/></svg>
        Play
      </button>
    </div>

    <div class="divider">or</div>

    <button class="btn btn-file" id="file">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
        <polyline points="17 8 12 3 7 8"></polyline>
        <line x1="12" y1="3" x2="12" y2="15"></line>
      </svg>
      Open Local File
    </button>

    <div class="formats">
      <span class="format-tag">MP4</span>
      <span class="format-tag">MKV</span>
      <span class="format-tag">WebM</span>
      <span class="format-tag">MOV</span>
      <span class="format-tag">TS</span>
      <span class="format-tag">AVI</span>
      <span class="format-tag">HEVC</span>
      <span class="format-tag">AV1</span>
      <span class="format-tag">HDR</span>
    </div>
  </div>

  <div class="footer">
    <div class="footer-hint">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="12" height="12">
        <circle cx="12" cy="12" r="10"></circle>
        <line x1="12" y1="16" x2="12" y2="12"></line>
        <line x1="12" y1="8" x2="12.01" y2="8"></line>
      </svg>
      <span>Right-click any video link for "Open with Movi Player"</span>
    </div>
    <div class="footer-links">
      <a href="https://github.com/MrUjjwalG/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M12 .3a12 12 0 00-3.8 23.4c.6.1.8-.3.8-.6v-2c-3.3.7-4-1.6-4-1.6-.6-1.4-1.4-1.8-1.4-1.8-1-.7.1-.7.1-.7 1.2.1 1.8 1.2 1.8 1.2 1 1.8 2.8 1.3 3.5 1 .1-.8.4-1.3.7-1.6-2.7-.3-5.5-1.3-5.5-6 0-1.2.5-2.3 1.3-3.1-.2-.4-.6-1.6.1-3.2 0 0 1-.3 3.4 1.2a11.5 11.5 0 016 0c2.3-1.5 3.3-1.2 3.3-1.2.7 1.6.3 2.8.2 3.2.7.8 1.2 1.9 1.2 3.1 0 4.6-2.8 5.6-5.5 5.9.5.4.9 1.2.9 2.4v3.5c0 .3.2.7.8.6A12 12 0 0012 .3"></path></svg>
        GitHub
      </a>
      <a href="https://www.npmjs.com/package/movi-player" target="_blank">
        <svg viewBox="0 0 24 24" fill="currentColor" width="14" height="14"><path d="M0 7.334v8h6.666v1.332H12v-1.332h12v-8H0zm6.666 6.664H5.334v-4H3.999v4H1.335V8.667h5.331v5.331zm4 0v1.336H8.001V8.667h5.334v5.331h-2.669zm12.001 0h-1.33v-4h-1.336v4h-1.335v-4h-1.33v4h-2.671V8.667h8.002v5.331z"></path></svg>
        npm
      </a>
      <a href="https://mrujjwalg.github.io/movi-player/" target="_blank">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="14" height="14"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"></path><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"></path></svg>
        Docs
      </a>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
