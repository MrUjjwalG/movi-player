  <!-- vinyl record -->
  <circle cx="300" cy="300" r="172" fill="#0b0b10" opacity="0.92"/>
  <circle cx="300" cy="300" r="150" fill="none" stroke="#ffffff" stroke-opacity="0.10" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="120" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="90" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1.5"/>
  <circle cx="300" cy="300" r="48" fill="url(#bg)"/>
  <circle cx="300" cy="300" r="12" fill="#0b0b10"/>
</svg>
